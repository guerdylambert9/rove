# Deploy preview builds to Vercel on push to main (and PRs).
# Required GitHub secrets (Flex Vercel account):
#   VERCEL_TOKEN
#   VERCEL_ORG_ID     (team_W9vKgMZTQ6fAeJJdWPtWD0Cf)
#   VERCEL_PROJECT_ID (prj_LjjS3qxT519ZQ2rabUR2Aj7Gn1gF)
# Optional: STAGING_ALIAS=rove-staging.vercel.app

name: Deploy staging

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_BYPASS_INSURANCE: ${{ secrets.VITE_BYPASS_INSURANCE }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy preview
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed: $url"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Alias staging
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          alias="${STAGING_ALIAS:-rove-staging.vercel.app}"
          vercel alias set "${{ steps.deploy.outputs.url }}" "$alias" --token=${{ secrets.VERCEL_TOKEN }} --scope flex26
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          STAGING_ALIAS: ${{ secrets.STAGING_ALIAS }}
